name: Build & Test

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # NOTE: Iggy requires SYS_NICE + seccomp:unconfined for io_uring,
    # which GitHub Actions service containers don't support.
    # Integration tests (IGGY_HOST) run locally only.
    # Unit tests (serializers, builder, SPI, factory) always run.

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and test
      run: mvn -B verify

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flink-connector-iggy
        path: target/flink-connector-iggy-*.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: flink-connector-iggy

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: flink-connector-iggy-*.jar
        generate_release_notes: true
